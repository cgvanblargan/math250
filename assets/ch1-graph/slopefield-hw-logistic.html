<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slope Field</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.6.0/jsxgraph.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.6.0/jsxgraphcore.js"></script>
<style>
  body { margin: 0; padding: 0; background: transparent; }
  #jxgbox-L { width: 100%; aspect-ratio: 1/1; }
</style>
</head>
<body>
<div id="jxgbox-L" class="jxgbox" role="region" aria-label="Slope field for a differential equation. Along the horizontal line y equals 0, all tick marks are flat. Along the horizontal line y equals 4, all tick marks are also flat. Between y equals 0 and y equals 4, tick marks tilt upward to the right, indicating solutions are increasing. Above y equals 4 and below y equals 0, tick marks tilt downward to the right, indicating solutions are decreasing."></div>
<script>
var board = JXG.JSXGraph.initBoard('jxgbox-L', {
  boundingbox: [-4, 7, 4, -3],
  axis: true,
  showCopyright: false,
  showNavigation: false
});

var xs = [-3,-2,-1,0,1,2,3];
var ys = [-2,-1,0,1,2,3,4,5,6];
var len = 0.32;

for (var i = 0; i < xs.length; i++) {
  for (var j = 0; j < ys.length; j++) {
    var x = xs[i], y = ys[j];
    var slope = y * (4 - y);
    var angle = Math.atan2(slope, 1);
    var dx = len * Math.cos(angle);
    var dy = len * Math.sin(angle);
    board.create('segment', [[x-dx, y-dy],[x+dx, y+dy]], {
      strokeColor: '#1a5276', strokeWidth: 1.5, fixed: true
    });
  }
}
</script>
</body>
</html>
