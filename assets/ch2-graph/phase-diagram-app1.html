<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase Diagram: dP/dt = (P-2)(P-4)</title>
<style>
  body { margin: 0; padding: 16px; font-family: serif; background: transparent; overflow: hidden; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<svg viewBox="0 0 600 130" width="100%" role="img"
  aria-label="Phase diagram for dP over dt equals P minus 2 times P minus 4. Equilibrium solutions marked as green dots at P equals 2 and P equals 4 on a number line. For P less than 2, an arrow points right indicating solutions are increasing. For 2 less than P less than 4, an arrow points left indicating solutions are decreasing. For P greater than 4, an arrow points right indicating solutions are increasing.">

  <!-- Number line -->
  <line x1="40" y1="65" x2="555" y2="65" stroke="#2c3e50" stroke-width="3"/>
  <polygon points="558,65 544,58 544,72" fill="#2c3e50"/>
  <polygon points="37,65 51,58 51,72" fill="#2c3e50"/>

  <!-- Arrow RIGHT for P<2 -->
  <line x1="85" y1="65" x2="223" y2="65" stroke="#1a5276" stroke-width="5"/>
  <polygon points="226,65 210,57 210,73" fill="#1a5276"/>

  <!-- Arrow LEFT for 2<P<4 -->
  <line x1="383" y1="65" x2="237" y2="65" stroke="#922b21" stroke-width="5"/>
  <polygon points="234,65 250,57 250,73" fill="#922b21"/>

  <!-- Arrow RIGHT for P>4 -->
  <line x1="397" y1="65" x2="520" y2="65" stroke="#1a5276" stroke-width="5"/>
  <polygon points="523,65 507,57 507,73" fill="#1a5276"/>

  <!-- Equilibrium dots -->
  <circle cx="230" cy="65" r="8" fill="#1e8449" stroke="white" stroke-width="1.5"/>
  <circle cx="390" cy="65" r="8" fill="#1e8449" stroke="white" stroke-width="1.5"/>

  <!-- Labels -->
  <text x="230" y="95" text-anchor="middle" font-size="22" font-family="serif" fill="#1e8449" font-weight="bold">2</text>
  <text x="390" y="95" text-anchor="middle" font-size="22" font-family="serif" fill="#1e8449" font-weight="bold">4</text>

  <!-- P axis label -->
  <text x="570" y="70" font-size="20" font-family="serif" fill="#2c3e50" font-style="italic">P</text>
</svg>
</body>
</html>
