<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Population Growth Model</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.6.0/jsxgraph.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.6.0/jsxgraphcore.js"></script>
<style>
  body {
    margin: 0;
    padding: 10px;
    font-family: serif;
    background: transparent;
    overflow: hidden;
  }
  #controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 8px;
    font-size: 16px;
    font-family: serif;
    color: #2c3e50;
  }
  #controls label {
    font-weight: bold;
  }
  #cslider {
    width: 200px;
    accent-color: #1a5276;
  }
  #cvalue {
    min-width: 40px;
    font-weight: bold;
    color: #1a5276;
  }
  #expression {
    text-align: center;
    font-size: 20px;
    font-family: serif;
    margin-bottom: 8px;
    color: #2c3e50;
    min-height: 28px;
  }
  #jxgbox {
    width: 100%;
    aspect-ratio: 3/2;
  }
</style>
</head>
<body>

<div id="expression"
  role="region"
  aria-label="Interactive display showing the current solution P(t) equals C times e to the 2t. Updates as C changes.">P(t) = e<sup>2t</sup></div>

<div id="controls">
  <label for="cslider">C =</label>
  <input type="range" id="cslider" min="-5" max="5" step="0.1" value="1"
    aria-label="Slider for constant C, ranging from negative 5 to 5. Controls the initial population P(0) equals C.">
  <span id="cvalue">1</span>
</div>

<div id="jxgbox" class="jxgbox"
  aria-label="Graph of P(t) equals C times e to the 2t with axes labeled t and P. A blue curve shows exponential growth or decay depending on C. A maroon dot marks the y-intercept at (0, C), showing the initial value P(0) equals C.">
</div>

<script>
  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-1, 10, 2, -10],
    axis: true,
    showCopyright: false,
    showNavigation: false,
    defaultAxes: {
      x: {
        name: 't',
        withLabel: true,
        label: { position: 'rt', offset: [-15, 15], fontSize: 16 }
      },
      y: {
        name: 'P',
        withLabel: true,
        label: { position: 'rt', offset: [15, 0], fontSize: 16 }
      }
    }
  });

  var C = 1;

  var curve = board.create('functiongraph', [
    function(t) { return C * Math.exp(2 * t); },
    -1, 2
  ], {
    strokeColor: '#1a5276',
    strokeWidth: 2.5
  });

  var dot = board.create('point', [0, C], {
    size: 5,
    color: '#922b21',
    fixed: true,
    name: '',
    label: { visible: false }
  });

  var dotLabel = board.create('text', [0.08, C, function() {
    var val = Math.round(C * 10) / 10;
    var display = Number.isInteger(val) ? val : val.toFixed(1);
    return 'P(0) = ' + display;
  }], {
    fontSize: 14,
    fontFamily: 'serif',
    color: '#922b21',
    fixed: true
  });

  function updateExpression(val) {
    var expr = document.getElementById('expression');
    var absC = Math.abs(val);
    var absCstr = Number.isInteger(absC) ? absC : absC.toFixed(1);
    if (val === 0) {
      expr.innerHTML = 'P(t) = 0';
    } else if (val === 1) {
      expr.innerHTML = 'P(t) = e<sup>2t</sup>';
    } else if (val === -1) {
      expr.innerHTML = 'P(t) = &minus;e<sup>2t</sup>';
    } else if (val > 0) {
      expr.innerHTML = 'P(t) = ' + absCstr + 'e<sup>2t</sup>';
    } else {
      expr.innerHTML = 'P(t) = &minus;' + absCstr + 'e<sup>2t</sup>';
    }
  }

  document.getElementById('cslider').addEventListener('input', function() {
    C = parseFloat(this.value);
    var display = Number.isInteger(C) ? C : C.toFixed(1);
    document.getElementById('cvalue').textContent = display;
    updateExpression(C);
    dot.setPosition(JXG.COORDS_BY_USER, [0, C]);
    board.update();
  });

  updateExpression(1);
</script>
</body>
</html>
