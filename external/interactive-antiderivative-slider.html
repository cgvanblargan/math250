<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>y = x² + C</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.6.0/jsxgraphcore.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.6.0/jsxgraph.css">
<style>
  body { margin: 0; padding: 10px; font-family: serif; background: transparent; overflow: hidden; }
  #expressions {
    text-align: center;
    font-size: 18px;
    font-family: serif;
    margin-bottom: 6px;
    color: #2c3e50;
    line-height: 1.6;
  }
  #expr-y { color: #1a5276; font-weight: bold; }
  #expr-dy { color: #555; }
  #controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 8px;
    font-size: 16px;
    font-family: serif;
    color: #2c3e50;
  }
  #controls label { font-weight: bold; font-size: 20px; }
  #cslider { width: 200px; accent-color: #1a5276; }
  #cvalue { min-width: 40px; font-weight: bold; font-size: 20px; color: #1a5276; }
  #jxgbox { width: 100%; height: 300px; }
</style>
</head>
<body>

<div id="expressions"
  role="region"
  aria-label="Interactive display showing y equals x squared plus C with a slider for C. A tangent line at x equals 1 moves with the curve but always has slope 2, showing dy/dx equals 2x is unchanged by C.">
  <div id="expr-y">y = x²</div>
  <div id="expr-dy">dy/dx = 2x &nbsp; (unchanged regardless of C!)</div>
</div>

<div id="controls">
  <label for="cslider">C =</label>
  <input type="range" id="cslider" min="-5" max="5" step="0.5" value="0"
    aria-label="Slider for constant C, ranging from negative 5 to 5">
  <span id="cvalue">0</span>
</div>

<div id="jxgbox" class="jxgbox"
  aria-label="Graph of y equals x squared plus C in blue. An amber dashed tangent line at x equals 1 moves up and down as C changes, but always has slope 2. This demonstrates that the derivative dy/dx equals 2x is the same for all values of C.">
</div>

<script>
  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-3, 12, 3, -6],
    axis: true,
    showCopyright: false,
    showNavigation: false,
    defaultAxes: {
      x: {
        name: 'x',
        withLabel: true,
        label: { position: 'rt', offset: [-15, 15], fontSize: 14 }
      },
      y: {
        name: 'y',
        withLabel: true,
        label: { position: 'rt', offset: [15, 0], fontSize: 14 }
      }
    }
  });

  var C = 0;

  // Parabola
  var curve = board.create('functiongraph', [
    function(x) { return x * x + C; },
    -3, 3
  ], {
    strokeColor: '#1a5276',
    strokeWidth: 2.5
  });



  // Tangent point at x=1: y = 1 + C, slope = 2
  var tanPoint = board.create('point', [1, 1 + C], {
    size: 5,
    color: '#b7770d',
    fixed: true,
    name: '',
    label: { visible: false }
  });

  // Tangent line at x=1: y = 2(x-1) + (1+C) = 2x - 1 + C
  var tangent = board.create('functiongraph', [
    function(x) { return 2 * x - 1 + C; },
    -3, 3
  ], {
    strokeColor: '#b7770d',
    strokeWidth: 2,
    dash: 2
  });

  // Tangent label
  var tangentLabel = board.create('text', [1.15, function() { return 1 + C - 0.4; }, 'slope = 2'], {
    fontSize: 13,
    fontFamily: 'serif',
    color: '#b7770d',
    fixed: true
  });

  function updateExpression(val) {
    var exprY = document.getElementById('expr-y');
    var absVal = Math.abs(val);
    var absDsp = Number.isInteger(absVal) ? absVal : absVal.toFixed(1);

    if (val === 0) {
      exprY.innerHTML = 'y = x\u00B2';
    } else if (val > 0) {
      exprY.innerHTML = 'y = x\u00B2 + ' + absDsp;
    } else {
      exprY.innerHTML = 'y = x\u00B2 \u2212 ' + absDsp;
    }
  }

  document.getElementById('cslider').addEventListener('input', function() {
    C = parseFloat(this.value);
    var display = Number.isInteger(C) ? C : C.toFixed(1);
    document.getElementById('cvalue').textContent = display;
    updateExpression(C);
    tanPoint.setPosition(JXG.COORDS_BY_USER, [1, 1 + C]);
    board.update();
  });

  updateExpression(0);
</script>
</body>
</html>
