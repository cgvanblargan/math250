<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifying y = Ce^{-x³}</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.6.0/jsxgraphcore.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.6.0/jsxgraph.css">
<style>
  body { margin: 0; padding: 10px; font-family: serif; background: transparent; overflow: hidden; }
  #expressions {
    text-align: center;
    font-size: 18px;
    font-family: serif;
    margin-bottom: 6px;
    line-height: 1.8;
  }
  #expr-y { font-weight: bold; font-size: 18px; }
  #expr-verify { color: #2c3e50; font-size: 18px; }
  .sub { color: #1e8449; font-weight: bold; }
  .ylabel { color: #1e8449; font-weight: bold; }
  #controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 8px;
    font-size: 16px;
    font-family: serif;
    color: #2c3e50;
  }
  #controls label { font-weight: bold; font-size: 20px; }
  #cslider { width: 200px; accent-color: #1a5276; }
  #cvalue { min-width: 40px; font-weight: bold; font-size: 20px; color: #1a5276; }
  #jxgbox { width: 100%; height: 260px; }
</style>
</head>
<body>

<div id="expressions" role="region" aria-label="Interactive display showing the solution y equals C times e to the negative x cubed, and verification that it satisfies the differential equation y prime plus 3 x squared y equals 0">
  <div id="expr-y" style="color:#1e8449;"><span class="ylabel">y</span> = Ce<sup>&#x2212;x&#xB3;</sup></div>
  <div id="expr-verify">
    LHS = y&prime; + 3x&sup2;y =
    (<span class="sub" id="sub-y1">Ce<sup>&#x2212;x&#xB3;</sup></span>)&prime;
    + 3x&sup2;(<span class="sub" id="sub-y2">Ce<sup>&#x2212;x&#xB3;</sup></span>)
    = 0 = RHS &#x2713;
  </div>
</div>

<div id="controls">
  <label for="cslider">C =</label>
  <input type="range" id="cslider" min="-3" max="3" step="0.5" value="1"
    aria-label="Slider for constant C, ranging from negative 3 to 3">
  <span id="cvalue">1</span>
</div>

<div id="jxgbox" class="jxgbox"
  aria-label="Graph of y equals C times e to the negative x cubed. As C changes with the slider, the curve updates. A red dot marks the y-intercept at (0, C), showing the initial value y(0) equals C.">
</div>

<script>
  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-2, 7, 2, -7],
    axis: true,
    showCopyright: false,
    showNavigation: false,
    defaultAxes: {
      x: {
        name: 'x',
        withLabel: true,
        label: { position: 'rt', offset: [-15, 15], fontSize: 14 }
      },
      y: {
        name: 'y',
        withLabel: true,
        label: { position: 'rt', offset: [15, 0], fontSize: 14 }
      }
    }
  });

  var C = 1;

  var curve = board.create('functiongraph', [
    function(x) { return C * Math.exp(-x * x * x); },
    -2, 2
  ], {
    strokeColor: '#1a5276',
    strokeWidth: 2.5
  });

  var dot = board.create('point', [0, C], {
    size: 5,
    color: '#922b21',
    fixed: true,
    name: '',
    label: { visible: false }
  });

  var dotLabel = board.create('text', [0.15, function() { return C - 0.4; }, function() {
    var val = Math.round(C * 10) / 10;
    var display = Number.isInteger(val) ? val : val.toFixed(1);
    return 'y(0) = ' + display;
  }], {
    fontSize: 13,
    fontFamily: 'serif',
    color: '#922b21',
    fixed: true
  });

  function getCExpr(val) {
    var absVal = Math.abs(val);
    var absDsp = Number.isInteger(absVal) ? absVal : absVal.toFixed(1);
    if (val === 0) return '0';
    if (val === 1) return 'e<sup>\u2212x\u00B3</sup>';
    if (val === -1) return '\u2212e<sup>\u2212x\u00B3</sup>';
    if (val > 0) return absDsp + 'e<sup>\u2212x\u00B3</sup>';
    return '\u2212' + absDsp + 'e<sup>\u2212x\u00B3</sup>';
  }

  function updateExpression(val) {
    var exprY = document.getElementById('expr-y');
    var sub1 = document.getElementById('sub-y1');
    var sub2 = document.getElementById('sub-y2');
    var expr = getCExpr(val);

    exprY.style.color = '#1e8449';
    exprY.innerHTML = '<span class="ylabel">y</span> = ' + expr;
    sub1.innerHTML = expr;
    sub2.innerHTML = expr;
  }

  document.getElementById('cslider').addEventListener('input', function() {
    C = parseFloat(this.value);
    var display = Number.isInteger(C) ? C : C.toFixed(1);
    document.getElementById('cvalue').textContent = display;
    updateExpression(C);
    dot.setPosition(JXG.COORDS_BY_USER, [0, C]);
    board.update();
  });

  updateExpression(1);
</script>
</body>
</html>
