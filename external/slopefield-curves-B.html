<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solution Curves B: incorrect</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.6.0/jsxgraph.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.6.0/jsxgraphcore.js"></script>
<style>
  body { margin: 0; padding: 6px; font-family: serif; background: transparent; overflow: hidden; }
  #label { text-align: center; font-size: 15px; font-family: serif; color: #2c3e50; margin-bottom: 4px; }
  #jxgbox { width: 100%; aspect-ratio: 1/1; }
</style>
</head>
<body>
<div id="label">Picture B</div>
<div id="jxgbox" class="jxgbox"
  role="region"
  aria-label="Picture B: slope field for dy over dx equals x plus y with incorrect solution curves overlaid. The curves run nearly horizontally and cross the steep tick marks at sharp angles rather than flowing with them.">
</div>
<script>
  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-3.5, 3.5, 3.5, -3.5],
    axis: true,
    showCopyright: false,
    showNavigation: false,
    defaultAxes: {
      x: { name: 'x', withLabel: true, label: { position: 'rt', offset: [-15, 15], fontSize: 13 } },
      y: { name: 'y', withLabel: true, label: { position: 'rt', offset: [15, 0], fontSize: 13 } }
    }
  });

  // Draw faint slope field (same x+y field)
  var xs = [-3,-2,-1,0,1,2,3];
  var ys = [-3,-2,-1,0,1,2,3];
  var len = 0.32;
  for (var j = 0; j < ys.length; j++) {
    for (var i = 0; i < xs.length; i++) {
      var x = xs[i], y = ys[j];
      var slope = x + y;
      var angle = Math.atan2(slope, 1);
      var dx = len * Math.cos(angle);
      var dy = len * Math.sin(angle);
      board.create('segment', [[x-dx, y-dy],[x+dx, y+dy]],
        { strokeColor: '#1a5276', strokeWidth: 1.4, fixed: true, highlight: false, opacity: 0.4 });
    }
  }

  // Wrong curves: solutions to dy/dx = x - y instead (y = Ce^{-x} + x + 1... but visually wrong for x+y field)
  // Use y = Ce^{-x} + x + 1 — these are flat and wrong against the x+y field
  var Cvals = [-2, -1, 0, 1, 2, 3];
  Cvals.forEach(function(C) {
    board.create('functiongraph', [
      function(C) { return function(x) { return C * Math.exp(-x) + x + 1; }; }(C),
      -3.5, 3.5
    ], {
      strokeColor: '#922b21',
      strokeWidth: 2.2,
      fixed: true,
      highlight: false
    });
  });
</script>
</body>
</html>
