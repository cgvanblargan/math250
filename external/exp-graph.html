<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graph of e^x</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.6.0/jsxgraphcore.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.6.0/jsxgraph.css">
<style>
  body { margin: 0; padding: 8px; overflow: hidden; background: transparent; }
  #jxgbox { width: 100%; height: 200px; }
  #caption { text-align: center; font-family: serif; font-size: 14px; color: #2c3e50; margin-top: 6px; }
</style>
</head>
<body>
<div id="jxgbox" class="jxgbox"
  aria-label="Graph of y equals e to the x. The curve is always above the x-axis, confirming e to the x is always positive. As x approaches negative infinity the curve approaches zero but never reaches it. As x increases the curve grows rapidly upward.">
</div>
<div id="caption">The graph of <i>y</i> = <i>e<sup>x</sup></i> is always positive.</div>
<script>
  var board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-3, 6, 3, -0.5],
    axis: true,
    showCopyright: false,
    showNavigation: false,
    defaultAxes: {
      x: {
        name: 'x',
        withLabel: true,
        label: { position: 'rt', offset: [-15, 15], fontSize: 14 }
      },
      y: {
        name: 'y',
        withLabel: true,
        label: { position: 'rt', offset: [15, 0], fontSize: 14 }
      }
    }
  });

  board.create('functiongraph', [
    function(x) { return Math.exp(x); },
    -3, 3
  ], {
    strokeColor: '#1a5276',
    strokeWidth: 2.5
  });

  board.create('text', [1.2, 4, 'y = eˣ'], {
    fontSize: 15,
    fontFamily: 'serif',
    color: '#1a5276',
    fixed: true
  });

  board.create('line', [[-3, 0], [3, 0]], {
    strokeColor: '#922b21',
    strokeWidth: 1.5,
    dash: 2,
    fixed: true,
    straightFirst: true,
    straightLast: true
  });

  board.create('text', [-2.5, 0.4, 'e^x > 0 always'], {
    fontSize: 12,
    fontFamily: 'serif',
    color: '#922b21',
    fixed: true
  });
</script>
</body>
</html>
