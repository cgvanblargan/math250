<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase Diagram: stability labels</title>
<style>
  body { margin: 0; padding: 16px; font-family: serif; background: transparent; overflow: hidden; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<svg viewBox="0 0 600 210" width="100%" role="img"
  aria-label="Phase diagram for dP over dt equals 2P times P minus 10 with stability labels. P equals 0 is stable because arrows point toward it from both sides. P equals 10 is unstable because arrows point away from it on both sides.">

  <!-- Number line -->
  <line x1="40" y1="105" x2="555" y2="105" stroke="#2c3e50" stroke-width="3"/>
  <polygon points="558,105 544,98 544,112" fill="#2c3e50"/>
  <polygon points="37,105 51,98 51,112" fill="#2c3e50"/>

  <!-- Arrow RIGHT for P<0 -->
  <line x1="85" y1="105" x2="223" y2="105" stroke="#1a5276" stroke-width="5"/>
  <polygon points="226,105 210,97 210,113" fill="#1a5276"/>

  <!-- Arrow LEFT for 0<P<10 -->
  <line x1="383" y1="105" x2="237" y2="105" stroke="#922b21" stroke-width="5"/>
  <polygon points="234,105 250,97 250,113" fill="#922b21"/>

  <!-- Arrow RIGHT for P>10 -->
  <line x1="397" y1="105" x2="520" y2="105" stroke="#1a5276" stroke-width="5"/>
  <polygon points="523,105 507,97 507,113" fill="#1a5276"/>

  <!-- Equilibrium dots -->
  <circle cx="230" cy="105" r="8" fill="#1e8449" stroke="white" stroke-width="1.5"/>
  <circle cx="390" cy="105" r="8" fill="#1e8449" stroke="white" stroke-width="1.5"/>

  <!-- P=0 and P=10 labels -->
  <text x="230" y="132" text-anchor="middle" font-size="22" font-family="serif" fill="#1e8449" font-weight="bold">0</text>
  <text x="390" y="132" text-anchor="middle" font-size="22" font-family="serif" fill="#1e8449" font-weight="bold">10</text>

  <!-- Region labels -->
  <text x="145" y="84" text-anchor="middle" font-size="22" font-family="serif" font-style="italic" fill="#1a5276">dP/dt &gt; 0</text>
  <text x="310" y="84" text-anchor="middle" font-size="22" font-family="serif" font-style="italic" fill="#922b21">dP/dt &lt; 0</text>
  <text x="458" y="84" text-anchor="middle" font-size="22" font-family="serif" font-style="italic" fill="#1a5276">dP/dt &gt; 0</text>

  <!-- Stability labels -->
  <text x="230" y="158" text-anchor="middle" font-size="19" font-family="serif" fill="#1a5276" font-weight="bold">stable</text>
  <text x="230" y="180" text-anchor="middle" font-size="16" font-family="serif" fill="#1a5276">(arrows point toward it)</text>

  <text x="390" y="158" text-anchor="middle" font-size="19" font-family="serif" fill="#922b21" font-weight="bold">unstable</text>
  <text x="390" y="180" text-anchor="middle" font-size="16" font-family="serif" fill="#922b21">(arrows point away)</text>

  <!-- P axis label -->
  <text x="570" y="110" font-size="20" font-family="serif" fill="#2c3e50" font-style="italic">P</text>
</svg>
</body>
</html>
